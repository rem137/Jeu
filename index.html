<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chemical Tower Defence</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Chemical Tower Defence</h1>
    <div id="stats"></div>
    <div id="controls">
        <button data-tower="H" class="active">Hydrogen (20)</button>
        <button data-tower="O">Oxygen (30)</button>
        <button data-tower="C">Carbon (50)</button>
        <button id="startBtn">Start Wave</button>
        <button id="pauseBtn">Pause</button>
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="startScreen" class="overlay">
        <h2>Bienvenue dans Chemical Tower Defence</h2>
        <p>Tapez pour placer des tours, touchez une tour pour l'améliorer. Maintenez Shift et touchez pour la vendre.</p>
        <button id="startGameBtn">Commencer</button>
    </div>
    <div id="gameOverScreen" class="overlay hidden">
        <h2>Game Over</h2>
        <p id="finalStats"></p>
        <button id="restartBtn">Restart</button>
    </div>
    <script src="js/towers.js"></script>
    <script src="js/enemies.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
