<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chemical Tower Defence</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameContainer">
        <div id="sidebar">
            <h1>Chemical Tower Defence</h1>
            <div id="stats"></div>
            <div id="controls">
                <button data-tower="H" class="active">Hydrogen (20)</button>
                <button data-tower="O">Oxygen (30)</button>
                <button data-tower="C">Carbon (50)</button>
                <button id="startBtn">Start Wave</button>
                <button id="pauseBtn">Pause</button>
            </div>
            <div id="panel">
                <h3 id="panelTitle"></h3>
                <p id="panelDetails"></p>
                <div id="panelActions">
                    <button id="upgradeBtn" class="hidden">Upgrade</button>
                    <button id="sellBtn" class="hidden">Sell</button>
                </div>
            </div>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>
    <div id="startScreen" class="overlay">
        <h2>Bienvenue dans Chemical Tower Defence</h2>
        <p>Touchez le champ pour placer une tour. Sélectionnez une tour pour afficher le panneau d'amélioration où vous pourrez l'améliorer ou la vendre.</p>
        <button id="startGameBtn">Commencer</button>
    </div>
    <div id="gameOverScreen" class="overlay hidden">
        <h2>Game Over</h2>
        <p id="finalStats"></p>
        <button id="restartBtn">Restart</button>
    </div>
    <script src="js/towers.js"></script>
    <script src="js/enemies.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
